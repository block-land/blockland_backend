services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the Supabase connection string in .env}
    command: sh -c "bunx drizzle-kit push --force && bun run src/db/migrate.ts"
    profiles: ["migrate"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the Supabase connection string in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://blockland.app,https://blockland.app}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-devnet}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      MERKLE_TREE: ${MERKLE_TREE:-89A62B9Bn45Nofa5CQXFUdyPPuo5Eth3rJkB288XWWGz}
      COLLECTION_MINT: ${COLLECTION_MINT:-FAtKx1TCQ9HZzoEfpo8DGatb9s6qUypQXJ7UvZWS1zSc}
      TREASURY: ${TREASURY:-4JDGwFWszhntY6N47r2u7QFjGRqeG8A8Pc3wgUkVY1mX}
      ADMIN_WALLET_JSON: ${ADMIN_WALLET_JSON:-}
      DEV_WALLET_JSON: ${DEV_WALLET_JSON:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  redis-data:
